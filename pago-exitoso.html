<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pago aprobado - VPS ARG</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

    font-family:Arial,sans-serif;

    background:
    radial-gradient(circle at top,#1e3a8a,#0f172a 60%);
}

.card{
    width:100%;
    max-width:650px;

    background:rgba(30,41,59,.96);

    border:1px solid rgba(59,130,246,.35);

    border-radius:22px;

    padding:45px 35px;

    text-align:center;

    box-shadow:
    0 0 40px rgba(59,130,246,.25);
}

h1{
    color:#22c55e;
    font-size:42px;
    margin-bottom:25px;
}

p{
    color:#e2e8f0;
    font-size:20px;
    line-height:1.8;
    margin:18px 0;
}

.boton{
    display:block;

    width:100%;
    max-width:380px;

    margin:15px auto;

    padding:16px;

    border-radius:12px;

    text-decoration:none;

    font-weight:bold;

    font-size:18px;

    transition:.25s;

    background:#06b6d4;
    color:white;
}

.boton:hover{
    transform:translateY(-2px);
    box-shadow:0 0 20px rgba(6,182,212,.5);
}

.boton.secundario{
    background:#334155;
}

.boton.secundario:hover{
    box-shadow:0 0 20px rgba(148,163,184,.4);
}
.whatsapp{
    background:#25D366;
}

.whatsapp:hover{
    background:#1ebe5d;
    box-shadow:0 0 20px rgba(37,211,102,.5);
}

@media(max-width:768px){

    .card{
        padding:35px 25px;
    }

    h1{
        font-size:34px;
    }

    p{
        font-size:18px;
    }

    .boton{
        font-size:17px;
    }
}

</style>

</head>

<body>

<div class="card">

<div id="contenido"></div>

<div id="botones"></div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const servicio = (params.get("servicio") || "").toLowerCase();

const contenido = document.getElementById("contenido");
const botones = document.getElementById("botones");

if(servicio === "iphone"){

contenido.innerHTML = `
<h1>🎉 ¡Felicitaciones!</h1>

<p>
Tu configuración ya fue activada.
</p>

<p>
📧 Revisá tu correo electrónico y seguí las instrucciones.
</p>

<p>
📱 Descargá NPV Tunnel.
</p>

<p>
Luego enviame tus credenciales por WhatsApp para generar tu archivo de configuración.
</p>
`;

const mensaje =
`Hola.

Ya realicé mi compra de IPHONE PREMIUM.

Ya revisé mi correo electrónico.

Mis credenciales son:

Usuario:
___________

Contraseña:
___________

Ya instalé NPV Tunnel.

Quedo a la espera del archivo de configuración.`;

botones.innerHTML = `
<a class="boton"
href="https://apps.apple.com/us/app/npv-tunnel/id1629465476/"
target="_blank">
📱 DESCARGAR NPV TUNNEL
</a>

<a class="boton whatsapp"
href="https://wa.me/5493435350260?text=${encodeURIComponent(mensaje)}"
target="_blank">
💬 ENVIAR CREDENCIALES POR WHATSAPP
</a>

<a class="boton secundario" href="/">
🏠 VOLVER AL INICIO
</a>
`;

}
else{

contenido.innerHTML = `
<h1>🎉 ¡Felicitaciones!</h1>

<p>
Tu configuración ya fue activada.
</p>

<p>
📧 Revisá tu correo electrónico y seguí las instrucciones.
</p>

<p>
📱 Descargá la aplicación VPS ARG para conectarte.
</p>
`;

botones.innerHTML = `
<a class="boton"
href="https://play.google.com/store/apps/details?id=app.vpsarg"
target="_blank">
📱 DESCARGAR APP VPS ARG
</a>

<a class="boton secundario" href="/">
🏠 VOLVER AL INICIO
</a>
`;
}

</script>

</body>
</html>
